<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Email Inbox Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <a href="/" class="brand">
                <span class="brand-mark">M</span>
                <div>
                    <p class="brand-label">Mail Archive</p>
                    <p class="brand-subtitle">Cloudflare Inbox</p>
                </div>
            </a>

            <nav class="sidebar-nav">
                <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">Inbox</a>
                <div class="nav-meta">
                    <span>Unread</span>
                    <span class="count-pill">{{ unread_count }}</span>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Admin Dashboard</p>
                    <h1>{% block header_title %}Inbox{% endblock %}</h1>
                </div>
                <div class="topbar-meta">
                    <span class="status-dot"></span>
                    <span>Live mailbox</span>
                </div>
            </header>

            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', path='js/app.js') }}"></script>
</body>
</html>
