<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Dashboard - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .email-row:hover { background-color: #f9fafb; cursor: pointer; }
        .modal { transition: opacity 0.25s ease; }
        .sidebar-item-active { background-color: #eef2ff; color: #4f46e5; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-hidden">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 hidden md:flex flex-col">
            <div class="p-6">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight">MailDash</span>
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a href="#" class="sidebar-item-active flex items-center px-4 py-2.5 text-sm font-medium rounded-lg transition-colors">
                    <i data-lucide="inbox" class="w-4 h-4 mr-3"></i> Inbox
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">
                    <i data-lucide="send" class="w-4 h-4 mr-3"></i> Sent
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">
                    <i data-lucide="trash-2" class="w-4 h-4 mr-3"></i> Trash
                </a>
            </nav>
            <div class="p-4 border-t border-gray-200">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center">
                        <i data-lucide="user" class="w-4 h-4 text-gray-500"></i>
                    </div>
                    <span class="text-sm font-medium">Admin User</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col bg-white overflow-hidden">
            <!-- Header -->
            <header class="h-16 border-b border-gray-200 flex items-center justify-between px-8 bg-white z-10">
                <div class="flex items-center space-x-4">
                    <button class="md:hidden p-2 rounded-lg hover:bg-gray-100">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <h1 class="text-lg font-semibold">Inbox</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" placeholder="Search emails..." class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-full text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all outline-none w-64">
                    </div>
                    <button class="p-2 rounded-lg hover:bg-gray-100 relative">
                        <i data-lucide="bell" class="w-5 h-5 text-gray-600"></i>
                        <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                </div>
            </header>

            <!-- Email List -->
            <div class="flex-1 overflow-y-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b border-gray-200 sticky top-0">
                        <tr>
                            <th class="px-8 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider w-1/4">Sender</th>
                            <th class="px-8 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Subject</th>
                            <th class="px-8 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">Date</th>
                        </tr>
                    </thead>
                    <tbody id="email-list">
                        {% for email in emails %}
                        <tr class="email-row border-b border-gray-100 group" onclick="viewEmail('{{ email.id }}', '{{ email.sender }}', '{{ email.subject }}', `{{ email.raw_email | replace('`', '\\`') }}`)">
                            <td class="px-8 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center font-medium mr-3 text-sm">
                                        {{ email.sender[0] | upper }}
                                    </div>
                                    <span class="font-medium text-gray-900">{{ email.sender }}</span>
                                </div>
                            </td>
                            <td class="px-8 py-4 text-gray-600 truncate max-w-md">
                                {{ email.subject }}
                            </td>
                            <td class="px-8 py-4 text-right text-sm text-gray-500 whitespace-nowrap">
                                {{ email.created_at.strftime('%b %d, %H:%M') }}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Email Modal (Side Panel) -->
    <div id="email-modal" class="fixed inset-0 bg-black bg-opacity-30 z-50 hidden flex justify-end">
        <div class="w-full max-w-2xl bg-white h-full shadow-2xl flex flex-col transform transition-transform duration-300 translate-x-full" id="modal-panel">
            <div class="p-6 border-b border-gray-200 flex items-center justify-between bg-white sticky top-0">
                <div class="flex items-center space-x-4">
                    <button onclick="closeModal()" class="p-2 rounded-lg hover:bg-gray-100">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                    <div>
                        <h2 class="font-bold text-xl" id="modal-subject">Subject</h2>
                        <p class="text-sm text-gray-500" id="modal-sender">From: sender@example.com</p>
                    </div>
                </div>
                <div class="flex items-center space-x-2">
                    <button class="p-2 rounded-lg hover:bg-gray-100 text-gray-600"><i data-lucide="reply" class="w-4 h-4"></i></button>
                    <button class="p-2 rounded-lg hover:bg-gray-100 text-gray-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            </div>
            <div class="flex-1 p-8 overflow-y-auto bg-gray-50">
                <div class="bg-white p-8 rounded-xl border border-gray-200 shadow-sm whitespace-pre-wrap font-mono text-sm leading-relaxed" id="modal-content">
                    Email content here...
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function viewEmail(id, sender, subject, content) {
            document.getElementById('modal-subject').innerText = subject;
            document.getElementById('modal-sender').innerText = 'From: ' + sender;
            document.getElementById('modal-content').innerText = content;
            
            const modal = document.getElementById('email-modal');
            const panel = document.getElementById('modal-panel');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                panel.classList.remove('translate-x-full');
            }, 10);
        }

        function closeModal() {
            const panel = document.getElementById('modal-panel');
            const modal = document.getElementById('email-modal');
            
            panel.classList.add('translate-x-full');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
